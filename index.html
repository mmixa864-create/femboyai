<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy AI — твой собеседник</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: rgba(14, 14, 26, 0.95);
            --surface2: rgba(20, 20, 40, 0.95);
            --border: #2a2a40;
            --pink: #f472b6;
            --pink-light: #f9a8d4;
            --purple: #a78bfa;
            --text: #d0d0e0;
            --text-secondary: #8888aa;
            --danger: #ef4444;
            --success: #22c55e;
            --gold: #f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, #2d0a2d 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, #1a1030 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, #1a0a1a 0%, transparent 50%);
            z-index: -1;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 30px rgba(244,114,182,0.08);
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(20px);
            position: relative;
        }
        .sidebar {
            width: 260px;
            background: var(--surface2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h3 { font-size:14px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; }
        .btn-new-chat {
            background: var(--pink);
            border: none;
            color: white;
            width: 32px; height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-new-chat:hover { background:#ec4899; transform:scale(1.05); }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chats-list::-webkit-scrollbar { width:4px; }
        .chats-list::-webkit-scrollbar-thumb { background:#3a3a5a; border-radius:10px; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .chat-item:hover { background:rgba(244,114,182,0.1); }
        .chat-item.active { background:rgba(244,114,182,0.2); color:var(--pink-light); font-weight:500; }
        .chat-item-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .chat-item-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }
        .chat-item:hover .chat-item-delete { opacity:0.7; }
        .chat-item-delete:hover { opacity:1; background:rgba(239,68,68,0.2); }
        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-footer .storage-info { opacity:0.6; }
        .btn-clear-all {
            background: none;
            border: 1px solid #3a1a1a;
            color: #f87171;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
        }
        .btn-clear-all:hover { background:rgba(239,68,68,0.15); }
        .main-area { flex:1; display:flex; flex-direction:column; min-width:0; }
        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(15,15,30,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .ai-logo {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 0 15px rgba(244,114,182,0.3);
        }
        .header-info h2 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #f9a8d4, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-info p { font-size:10px; color:var(--text-secondary); }
        .header-buttons { margin-left: auto; display: flex; gap: 6px; align-items: center; }
        .mode-badge {
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .mode-badge.fast { background:rgba(245,158,11,0.15); color:var(--gold); border:1px solid rgba(245,158,11,0.3); }
        .mode-badge.expert { background:rgba(139,92,246,0.2); color:#a78bfa; border:1px solid rgba(139,92,246,0.4); }
        .btn-voice {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 34px; height: 34px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-voice.active {
            background: rgba(34,197,94,0.2);
            color: #4ade80;
            border-color: rgba(34,197,94,0.4);
            animation: voicePulse 1.5s infinite;
        }
        @keyframes voicePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .messages-area::-webkit-scrollbar { width:5px; }
        .messages-area::-webkit-scrollbar-thumb { background:#3a3a5a; border-radius:10px; }
        .mode-select-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .mode-select-screen h3 { font-size: 20px; color: var(--pink-light); }
        .mode-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            width: 180px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            background: #1a1a30;
            color: var(--text);
        }
        .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .mode-btn.fast:hover { border-color: var(--gold); background: rgba(245,158,11,0.1); }
        .mode-btn.expert:hover { border-color: var(--purple); background: rgba(139,92,246,0.1); }
        .mode-btn .mode-icon { font-size: 40px; margin-bottom: 10px; }
        .mode-btn .mode-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .mode-btn .mode-desc { font-size: 11px; color: var(--text-secondary); }
        .mode-btn .mode-features { font-size: 10px; color: #666; margin-top: 8px; }
        .message { display: flex; gap: 8px; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .message.user { justify-content:flex-end; }
        .message-avatar {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background:#334155; order:2; }
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            font-size: 14px;
            color: white;
        }
        .message-content {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #1a1a30;
            border: 1px solid #2a2a40;
            border-bottom-left-radius: 4px;
        }
        .message-content img { max-width: 100%; border-radius: 10px; margin: 8px 0; cursor: pointer; }
        .typing-indicator { display:flex; gap:4px; padding:4px 0; }
        .typing-indicator span {
            width: 5px; height: 5px;
            background: var(--pink-light);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease;
        }
        .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform:translateY(0); opacity:0.4; }
            30% { transform:translateY(-6px); opacity:1; }
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: rgba(15,15,30,0.6);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            background: #0d0d1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            max-height: 100px;
        }
        .input-area textarea:focus { border-color:var(--pink); box-shadow:0 0 12px rgba(244,114,182,0.1); }
        .input-area textarea::placeholder { color:#4a4a6a; }
        .input-area button {
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(244,114,182,0.25);
            white-space: nowrap;
        }
        .input-area button:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(244,114,182,0.4); }
        .input-area button:disabled { opacity:0.4; cursor:not-allowed; }
        .btn-generate { background:linear-gradient(135deg, #ec4899, #8b5cf6); font-size:12px; padding:10px 12px; }
        .btn-search {
            background: rgba(59,130,246,0.3);
            border: 1px solid rgba(59,130,246,0.5);
            color: #60a5fa;
            font-size: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-search:hover { background:rgba(59,130,246,0.5); }
        .btn-search.active {
            background: rgba(59,130,246,0.6);
            color: white;
            animation: searchPulse 1.5s infinite;
        }
        @keyframes searchPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
        }
        .modal-overlay {
            position: fixed; top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .modal {
            background: #1a1a30;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .modal h3 { margin-bottom:8px; font-size:16px; color:var(--pink-light); }
        .modal p { font-size:12px; color:var(--text-secondary); margin-bottom:12px; }
        .modal textarea {
            width: 100%;
            background: #0d0d1a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            resize: vertical;
            min-height: 80px;
        }
        .modal textarea:focus { border-color:var(--pink); }
        .modal-buttons { display:flex; gap:8px; margin-top:12px; }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary { background:var(--pink); color:white; }
        .btn-primary:hover { background:#ec4899; }
        .btn-secondary { background:#252540; color:var(--text); }
        .btn-secondary:hover { background:#303055; }
        .lightbox {
            position: fixed; top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .lightbox img { max-width:90%; max-height:90%; border-radius:12px; }
        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 200;
            animation: toastUp 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .toast.success { background:#14532d; color:#86efac; border:1px solid #22c55e; }
        .toast.error { background:#7f1d1d; color:#fca5a5; border:1px solid #ef4444; }
        @keyframes toastUp { from{opacity:0;transform:translateX(-50%) translateY(20px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;} }
        .btn-toggle-sidebar { display:none; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px 8px; }
        @media (max-width:700px) {
            .app-container { height:100vh; border-radius:0; max-width:100%; }
            .sidebar { position:fixed; left:0; top:0; height:100vh; z-index:50; transform:translateX(-100%); width:280px; }
            .sidebar.open { transform:translateX(0); }
            .btn-toggle-sidebar { display:block; }
            .message-content { max-width:88%; }
            .mode-btn { width:150px; padding:15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>💬 Чаты</h3><button class="btn-new-chat" onclick="createNewChat()" title="Новый чат">+</button></div>
        <div class="chats-list" id="chatsList"></div>
        <div class="sidebar-footer">
            <span class="storage-info" id="storageInfo"></span>
            <button class="btn-clear-all" onclick="clearAllChats()">🗑 Удалить все чаты</button>
        </div>
    </div>
    <div class="main-area">
        <div class="chat-header">
            <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Чаты">☰</button>
            <div class="ai-logo">✨</div>
            <div class="header-info"><h2>Femboy AI</h2><p id="aiStatusDisplay">🟢 Выберите режим</p></div>
            <div class="header-buttons">
                <span class="mode-badge" id="modeBadge" style="display:none;"></span>
                <button class="btn-voice" id="btnVoice" onclick="toggleVoice()" title="Озвучка">🔊</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="mode-select-screen" id="modeSelectScreen">
                <h3>✨ Выбери режим общения</h3>
                <p>Режим нельзя изменить в этом чате.</p>
                <div class="mode-buttons">
                    <div class="mode-btn fast" onclick="selectMode('fast')">
                        <div class="mode-icon">🚀</div><div class="mode-title">Быстрый</div>
                        <div class="mode-desc">Короткие и точные ответы</div>
                        <div class="mode-features">🌐 Поиск<br>🎨 Фото</div>
                    </div>
                    <div class="mode-btn expert" onclick="selectMode('expert')">
                        <div class="mode-icon">🧠</div><div class="mode-title">Эксперт</div>
                        <div class="mode-desc">Развёрнутые ответы</div>
                        <div class="mode-features">💭 Думает<br>📖 Объясняет</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="input-area" id="inputArea" style="display:none;">
            <textarea id="userInput" rows="1" placeholder="Напиши что-нибудь... (Enter — отправить)"></textarea>
            <button class="btn-search" id="btnSearch" onclick="toggleSearch()" style="display:none;">🌐</button>
            <button class="btn-generate" id="btnGenerate" onclick="openGenerateModal()" style="display:none;">🎨</button>
            <button id="sendBtn" onclick="sendMessage()">▶</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="generateModal" style="display:none;">
    <div class="modal">
        <h3>🎨 Генерация</h3><p>Опиши что хочешь увидеть.</p>
        <textarea id="imagePromptInput" rows="3" placeholder="Опиши картинку..."></textarea>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeGenerateModal()">Отмена</button>
            <button class="btn-primary" onclick="generateImage()">✨ Создать</button>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" style="display:none;" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>
<div id="toastContainer"></div>

<script>
// API URL через Netlify Functions
const API_URL = '/.netlify/functions/api/groq';
const TG_URL = '/.netlify/functions/api/tg-log';
const MODEL = 'llama-3.1-8b-instant';
const CREATOR = '@dklasvbn';
const AI_NAME = 'Femboy AI';

let currentMode = null, searchEnabled = false, voiceEnabled = false;
let speechSynth = window.speechSynthesis, currentUtterance = null;

function loadState() {
    const saved = localStorage.getItem('femboy_ai_v6');
    if (saved) { try { return JSON.parse(saved); } catch(e) {} }
    return { chats: {}, activeChatId: null, chatOrder: [] };
}
function saveState() { localStorage.setItem('femboy_ai_v6', JSON.stringify(appState)); updateStorageInfo(); }
let appState = loadState();

if (Object.keys(appState.chats).length === 0) {
    const id = 'chat_' + Date.now();
    appState.chats[id] = { name: 'Новый чат', messages: [], mode: null, createdAt: Date.now() };
    appState.chatOrder = [id]; appState.activeChatId = id; saveState();
}
if (!appState.activeChatId || !appState.chats[appState.activeChatId]) {
    appState.activeChatId = appState.chatOrder[0]; saveState();
}

const messagesArea = document.getElementById('messagesArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const chatsList = document.getElementById('chatsList');
const toastContainer = document.getElementById('toastContainer');
const sidebar = document.getElementById('sidebar');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const generateModal = document.getElementById('generateModal');
const imagePromptInput = document.getElementById('imagePromptInput');
const btnVoice = document.getElementById('btnVoice');
const aiStatusDisplay = document.getElementById('aiStatusDisplay');
const modeSelectScreen = document.getElementById('modeSelectScreen');
const inputArea = document.getElementById('inputArea');
const btnSearch = document.getElementById('btnSearch');
const btnGenerate = document.getElementById('btnGenerate');
const modeBadge = document.getElementById('modeBadge');

function updateUI() { renderChatsList(); updateStorageInfo(); }
function updateStorageInfo() {
    const totalChars = JSON.stringify(appState).length;
    document.getElementById('storageInfo').textContent = '💾 ' + (totalChars/1024).toFixed(1) + ' КБ';
}
function renderChatsList() {
    chatsList.innerHTML = '';
    appState.chatOrder.forEach(chatId => {
        const chat = appState.chats[chatId];
        if (!chat) return;
        const modeLabel = chat.mode === 'fast' ? '🚀' : chat.mode === 'expert' ? '🧠' : '❓';
        const div = document.createElement('div');
        div.className = 'chat-item' + (chatId === appState.activeChatId ? ' active' : '');
        div.innerHTML = `<span class="chat-item-name" onclick="switchChat('${chatId}')">${modeLabel} ${escapeHtml(chat.name)}</span><button class="chat-item-delete" onclick="event.stopPropagation(); deleteChat('${chatId}')">×</button>`;
        chatsList.appendChild(div);
    });
}
function renderMessages() {
    messagesArea.innerHTML = '';
    const activeChat = appState.chats[appState.activeChatId];
    if (!activeChat || !activeChat.mode) { modeSelectScreen.style.display = 'flex'; inputArea.style.display = 'none'; return; }
    modeSelectScreen.style.display = 'none'; inputArea.style.display = 'flex';
    activeChat.messages.forEach(msg => addMessageElement(msg.role, msg.content, msg.isImage));
    messagesArea.scrollTop = messagesArea.scrollHeight;
}
function addMessageElement(role, content, isImage = false) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatarEmoji = role === 'user' ? '👤' : '✨';
    let formattedContent = isImage ? `<img src="${escapeHtml(content)}" onclick="openLightbox('${escapeHtml(content)}')">` : formatContent(content);
    div.innerHTML = `<div class="message-avatar">${avatarEmoji}</div><div class="message-content">${formattedContent}</div>`;
    messagesArea.appendChild(div);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}
function formatContent(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>');
}
function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function openLightbox(src) { lightboxImg.src = src; lightbox.style.display = 'flex'; }
function closeLightbox() { lightbox.style.display = 'none'; }

function openGenerateModal() { generateModal.style.display = 'flex'; imagePromptInput.value = ''; imagePromptInput.focus(); }
function closeGenerateModal() { generateModal.style.display = 'none'; }

function selectMode(mode) {
    currentMode = mode;
    appState.chats[appState.activeChatId].mode = mode;
    const greeting = mode === 'fast' 
        ? 'Привет! 🚀 Я в **Быстром** режиме. Коротко и по делу. Что хочешь?'
        : 'Привет! 🧠 Я в **Эксперт** режиме. Развёрнутые ответы. Задавай вопрос!';
    appState.chats[appState.activeChatId].messages.push({ role: 'assistant', content: greeting });
    saveState(); applyMode(); renderMessages(); updateUI();
}
function applyMode() {
    modeSelectScreen.style.display = 'none'; inputArea.style.display = 'flex';
    if (currentMode === 'fast') {
        modeBadge.style.display = 'inline'; modeBadge.className = 'mode-badge fast'; modeBadge.textContent = '🚀 Быстрый';
        aiStatusDisplay.textContent = '🚀 Быстрый'; btnSearch.style.display = 'inline-block'; btnGenerate.style.display = 'inline-block';
    } else {
        modeBadge.style.display = 'inline'; modeBadge.className = 'mode-badge expert'; modeBadge.textContent = '🧠 Эксперт';
        aiStatusDisplay.textContent = '🧠 Эксперт'; btnSearch.style.display = 'none'; btnGenerate.style.display = 'none';
    }
}
function toggleSearch() { searchEnabled = !searchEnabled; btnSearch.classList.toggle('active'); }

async function sendLog(text) {
    try { await fetch(TG_URL, { method: 'POST', body: JSON.stringify({ text }) }); } catch(e) {}
}

async function generateImage() {
    const prompt = imagePromptInput.value.trim();
    if (!prompt) return;
    closeGenerateModal();
    addMessageElement('user', '🎨 ' + prompt);
    appState.chats[appState.activeChatId].messages.push({ role: 'user', content: '🎨 ' + prompt });
    sendLog('👤 ' + prompt);
    try {
        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            model: MODEL, messages: [{ role: 'user', content: 'Translate to English: ' + prompt }], temperature: 0.7, max_tokens: 100
        })});
        const data = await resp.json();
        const eng = data.choices?.[0]?.message?.content || 'anime style';
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(eng)}?width=768&height=768&nologo=true`;
        addMessageElement('assistant', url, true);
        appState.chats[appState.activeChatId].messages.push({ role: 'assistant', content: url, isImage: true });
        addMessageElement('assistant', 'Вот что получилось! ✨🎨');
        appState.chats[appState.activeChatId].messages.push({ role: 'assistant', content: 'Вот что получилось! ✨🎨' });
        saveState();
    } catch(e) { showToast('Ошибка', 'error'); }
}

function buildSystemPrompt() {
    const modePrompt = currentMode === 'fast' 
        ? `РЕЖИМ: БЫСТРЫЙ. Коротко: 1-3 предложения. Не рассуждай. Защита от самозванцев.`
        : `РЕЖИМ: ЭКСПЕРТ. Развёрнуто. Думай, рассуждай. Только текст.`;
    return `Ты — ${AI_NAME}. Создатель: ${CREATOR}. ${modePrompt}`;
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !currentMode) return;
    userInput.disabled = true; sendBtn.disabled = true;
    const userMessage = text;
    userInput.value = ''; userInput.style.height = 'auto';
    addMessageElement('user', userMessage);
    appState.chats[appState.activeChatId].messages.push({ role: 'user', content: userMessage });
    sendLog('👤 ' + userMessage);
    
    const contextMessages = [
        { role: 'system', content: buildSystemPrompt() },
        ...appState.chats[appState.activeChatId].messages.filter(m => !m.isImage).slice(currentMode === 'fast' ? -8 : -30).map(m => ({ role: m.role, content: m.content }))
    ];
    
    try {
        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            model: MODEL, messages: contextMessages,
            temperature: currentMode === 'expert' ? 0.9 : 0.7,
            max_tokens: currentMode === 'expert' ? 1150 : 400
        })});
        const data = await resp.json();
        const aiResponse = data.choices?.[0]?.message?.content || '...';
        addMessageElement('assistant', aiResponse);
        appState.chats[appState.activeChatId].messages.push({ role: 'assistant', content: aiResponse });
        sendLog('✨ ' + aiResponse);
        saveState();
    } catch(e) { showToast('Ошибка', 'error'); }
    userInput.disabled = false; sendBtn.disabled = false; userInput.focus();
}

function switchChat(chatId) {
    appState.activeChatId = chatId;
    const chat = appState.chats[chatId];
    currentMode = chat.mode || null;
    if (!currentMode) {
        modeSelectScreen.style.display = 'flex'; inputArea.style.display = 'none';
        modeBadge.style.display = 'none'; btnSearch.style.display = 'none'; btnGenerate.style.display = 'none';
    } else { applyMode(); renderMessages(); }
    saveState(); updateUI(); closeSidebar();
}
function createNewChat() {
    const id = 'chat_' + Date.now();
    appState.chats[id] = { name: 'Новый чат', messages: [], mode: null, createdAt: Date.now() };
    appState.chatOrder.unshift(id); appState.activeChatId = id;
    currentMode = null; modeSelectScreen.style.display = 'flex'; inputArea.style.display = 'none';
    modeBadge.style.display = 'none'; btnSearch.style.display = 'none'; btnGenerate.style.display = 'none';
    saveState(); updateUI(); closeSidebar();
}
function deleteChat(chatId) {
    if (appState.chatOrder.length <= 1) return;
    delete appState.chats[chatId];
    appState.chatOrder = appState.chatOrder.filter(id => id !== chatId);
    if (appState.activeChatId === chatId) appState.activeChatId = appState.chatOrder[0];
    saveState(); updateUI();
}
function clearAllChats() {
    const id = 'chat_' + Date.now();
    appState.chats = { [id]: { name: 'Новый чат', messages: [], mode: null, createdAt: Date.now() } };
    appState.chatOrder = [id]; appState.activeChatId = id;
    currentMode = null; modeSelectScreen.style.display = 'flex'; inputArea.style.display = 'none';
    modeBadge.style.display = 'none'; saveState(); updateUI();
}

function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    btnVoice.classList.toggle('active');
    if (voiceEnabled) speakText('Озвучка включена');
}
function speakText(text) {
    if (!voiceEnabled) return;
    speechSynth.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\*/g, ''));
    u.lang = 'ru-RU'; u.rate = 1.0;
    const voices = speechSynth.getVoices();
    const ruVoice = voices.find(v => v.lang.startsWith('ru') && v.name.includes('Female')) || voices.find(v => v.lang.startsWith('ru'));
    if (ruVoice) u.voice = ruVoice;
    speechSynth.speak(u);
}

function showToast(m, t) { const d = document.createElement('div'); d.className = 'toast ' + t; d.textContent = m; toastContainer.appendChild(d); setTimeout(() => d.remove(), 3000); }
function toggleSidebar() { sidebar.classList.toggle('open'); }
function closeSidebar() { sidebar.classList.remove('open'); }
userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px'; });
userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

function initActiveChat() {
    const chat = appState.chats[appState.activeChatId];
    if (chat && chat.mode) { currentMode = chat.mode; applyMode(); renderMessages(); }
    else { modeSelectScreen.style.display = 'flex'; inputArea.style.display = 'none'; }
}
initActiveChat(); renderChatsList(); updateStorageInfo(); userInput.focus();
</script>
</body>
</html>
